<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso Negado — MEDTRANS 360</title>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04080f;color:#e8f0fe;font-family:'Exo 2',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{text-align:center;max-width:400px;padding:40px}
.code{font-size:5rem;font-weight:900;color:#ff3d5a;line-height:1}
.title{font-size:1.2rem;font-weight:800;margin:12px 0 8px;letter-spacing:2px}
.desc{font-size:.8rem;color:#8ba3c7;margin-bottom:24px}
.btn{display:inline-block;padding:10px 24px;background:#0066ff;color:#fff;text-decoration:none;border-radius:8px;font-weight:700;font-size:.85rem}
</style>
</head>
<body>
<div class="box">
  <div class="code">403</div>
  <div class="title">ACESSO NEGADO</div>
  <div class="desc">Seu perfil <strong style="color:#ff3d5a">{{ perfil }}</strong> não tem permissão para acessar esta área.</div>
  <a href="/" class="btn">Voltar ao Início</a>
</div>
</body>
</html>
