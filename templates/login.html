<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — MEDTRANS 360</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#060c18;color:#e8f0fe;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,102,255,.15) 0%,transparent 70%)}
.login-box{
  background:#0d1830;border:1px solid rgba(255,255,255,.07);border-radius:24px;
  padding:48px 40px;width:min(440px,95vw);
}
.logo{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;text-align:center;margin-bottom:6px;
  background:linear-gradient(135deg,#0066ff,#00e5ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{text-align:center;font-size:13px;color:#6b7fa3;margin-bottom:36px}
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:500;color:#6b7fa3;
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
input{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
  border-radius:10px;padding:12px 16px;color:#e8f0fe;font-size:15px;
  font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
input:focus{border-color:rgba(0,102,255,.5)}
.btn-login{
  width:100%;padding:14px;background:linear-gradient(135deg,#0066ff,#7b42f6);
  color:#fff;border:0;border-radius:12px;font-size:16px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;
  box-shadow:0 10px 30px rgba(0,102,255,.3);transition:all .25s;
}
.btn-login:hover{box-shadow:0 16px 40px rgba(0,102,255,.5);transform:translateY(-1px)}
.erro{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);
  color:#ff4757;border-radius:10px;padding:12px 16px;font-size:14px;margin-bottom:18px}
.demo-box{margin-top:24px;padding:16px;background:rgba(0,102,255,.06);
  border:1px solid rgba(0,102,255,.2);border-radius:12px;font-size:13px;color:#6b7fa3}
.demo-box strong{color:#0066ff;display:block;margin-bottom:4px}
.demo-btn{
  margin-top:10px;width:100%;padding:8px;background:rgba(0,102,255,.15);
  color:#0066ff;border:1px solid rgba(0,102,255,.3);border-radius:8px;
  cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .2s;
}
.demo-btn:hover{background:rgba(0,102,255,.25)}
.footer{text-align:center;margin-top:24px;font-size:12px;color:#3a4a6b}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">MEDTRANS 360</div>
  <div class="logo-sub">Plataforma de Transporte de Pacientes</div>
  {% if erro %}<div class="erro">⚠️ {{ erro }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" name="email" placeholder="seu@email.com" required autocomplete="username">
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" name="senha" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Entrar no sistema →</button>
  </form>
  <div class="demo-box">
    <strong>🔑 Acesso de demonstração</strong>
    admin@medtrans360.com.br / Admin@2025!
    <button class="demo-btn" onclick="preencherDemo()">Preencher automaticamente</button>
  </div>
  <div class="footer">MEDTRANS 360 © SpyNet Tecnologia Forense | CNPJ 64.000.808/0001-51</div>
</div>
<script>
function preencherDemo(){
  document.querySelector('[name=email]').value='admin@medtrans360.com.br';
  document.querySelector('[name=senha]').value='Admin@2025!';
}
</script>
</body>
</html>
