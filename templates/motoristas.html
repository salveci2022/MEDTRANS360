{% extends "base.html" %}
{% block title %}Motoristas — MEDTRANS 360{% endblock %}
{% block page_title %}🧑‍✈️ Motoristas{% endblock %}
{% block content %}
<div style="display:flex;gap:12px;margin-bottom:20px">
  <button class="btn btn-primary" onclick="openModal('modal-mot')">+ Novo Motorista</button>
</div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Nome</th><th>CNH</th><th>Telefone</th><th>Veículo</th><th>Placa</th><th>Consumo</th><th>Status</th><th>Ações</th></tr></thead>
      <tbody id="tbody-mot"><tr><td colspan="9"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
    </table>
  </div>
</div>
<div class="modal-overlay" id="modal-mot">
  <div class="modal">
    <div class="modal-title">🧑‍✈️ Novo Motorista <button class="modal-close" onclick="closeModal('modal-mot')">✕</button></div>
    <div class="form-grid">
      <div class="form-group full"><label>Nome Completo *</label><input id="m-nome" placeholder="Nome do motorista"></div>
      <div class="form-group"><label>CPF</label><input id="m-cpf" placeholder="000.000.000-00"></div>
      <div class="form-group"><label>CNH</label><input id="m-cnh" placeholder="Número da CNH"></div>
      <div class="form-group"><label>Telefone</label><input id="m-tel" placeholder="(00) 00000-0000"></div>
      <div class="form-group"><label>Veículo</label><input id="m-veiculo" placeholder="Ex: Fiat Strada 2022"></div>
      <div class="form-group"><label>Placa</label><input id="m-placa" placeholder="AAA-0000"></div>
      <div class="form-group"><label>Consumo Médio (km/l)</label><input id="m-consumo" type="number" value="10" step="0.1"></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('modal-mot')">Cancelar</button>
      <button class="btn btn-primary" onclick="criarMotorista()">Salvar Motorista</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadMotoristas(){
  const d=await api('/api/motoristas');
  const tbody=document.getElementById('tbody-mot');
  if(!d.motoristas?.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:24px">Nenhum motorista cadastrado</td></tr>';return;}
  tbody.innerHTML=d.motoristas.map(m=>`
    <tr>
      <td>${m.id}</td><td><strong>${m.nome}</strong></td>
      <td>${m.cnh||'—'}</td><td>${m.telefone||'—'}</td>
      <td>${m.veiculo||'—'}</td><td>${m.placa||'—'}</td>
      <td>${m.consumo_km||10} km/l</td>
      <td><span class="badge ${m.status==='online'?'badge-green':'badge-gray'}">${m.status}</span></td>
      <td>
        <button class="btn btn-sm ${m.status==='online'?'btn-danger':'btn-success'}" onclick="toggleStatus(${m.id},'${m.status==='online'?'offline':'online'}')">
          ${m.status==='online'?'Offline':'Online'}
        </button>
        <button class="btn btn-sm btn-danger" onclick="deletar(${m.id})">🗑</button>
      </td>
    </tr>`).join('');
}
async function criarMotorista(){
  const body={nome:document.getElementById('m-nome').value,cpf:document.getElementById('m-cpf').value,
    cnh:document.getElementById('m-cnh').value,telefone:document.getElementById('m-tel').value,
    veiculo:document.getElementById('m-veiculo').value,placa:document.getElementById('m-placa').value,
    consumo_km:parseFloat(document.getElementById('m-consumo').value)||10};
  if(!body.nome){toast('Informe o nome','error');return;}
  const d=await api('/api/motoristas','POST',body);
  if(d.ok){toast('Motorista cadastrado!','success');closeModal('modal-mot');loadMotoristas();}
  else toast('Erro: '+d.error,'error');
}
async function toggleStatus(id,status){
  await api(`/api/motoristas/${id}/status`,'POST',{status});
  loadMotoristas();
}
async function deletar(id){
  if(!confirm('Remover este motorista?'))return;
  await api(`/api/motoristas/${id}`,'DELETE');
  toast('Removido','info'); loadMotoristas();
}
loadMotoristas();
</script>
{% endblock %}
