<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Acesso Negado — MEDTRANS 360</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#060c18;color:#e8f0fe;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{text-align:center;max-width:440px;padding:0 20px}
.icon{font-size:64px;margin-bottom:24px;filter:grayscale(0.3)}
h1{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:#ff4757;margin-bottom:12px}
p{color:#6b7fa3;font-size:15px;line-height:1.6;margin-bottom:24px}
.badge{display:inline-block;background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:#ff4757;padding:6px 16px;border-radius:999px;font-size:13px;font-weight:600;margin-bottom:28px}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#0066ff,#7b42f6);color:#fff;text-decoration:none;border-radius:12px;padding:12px 28px;font-size:15px;font-weight:500;font-family:'DM Sans',sans-serif;border:0;cursor:pointer}
</style>
</head>
<body>
<div class="box">
  <div class="icon">🔒</div>
  <h1>Acesso Negado</h1>
  <div class="badge">Perfil: {{ perfil_atual|title if perfil_atual else 'Desconhecido' }}</div>
  <p>Você não tem permissão para acessar esta página.<br>Entre em contato com o administrador.</p>
  <a href="/" class="btn">← Voltar ao início</a>
</div>
</body>
</html>
