{% extends "base.html" %}
{% block title %}Clínicas — MEDTRANS 360{% endblock %}
{% block page_title %}🏢 Clínicas{% endblock %}
{% block content %}
<div style="display:flex;gap:12px;margin-bottom:20px">
  <button class="btn btn-primary" onclick="openModal('modal-cli')">+ Nova Clínica</button>
</div>
<div class="card">
  <div class="table-wrap">
    <table>
      <thead><tr><th>#</th><th>Nome</th><th>CNPJ</th><th>Responsável</th><th>Telefone</th><th>Cidade</th><th>Estado</th></tr></thead>
      <tbody id="tbody-cli"><tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
    </table>
  </div>
</div>
<div class="modal-overlay" id="modal-cli">
  <div class="modal">
    <div class="modal-title">🏢 Nova Clínica <button class="modal-close" onclick="closeModal('modal-cli')">✕</button></div>
    <div class="form-grid">
      <div class="form-group full"><label>Nome da Clínica *</label><input id="cl-nome" placeholder="Nome completo da clínica"></div>
      <div class="form-group"><label>CNPJ</label><input id="cl-cnpj" placeholder="00.000.000/0001-00"></div>
      <div class="form-group"><label>Responsável</label><input id="cl-resp" placeholder="Nome do responsável"></div>
      <div class="form-group"><label>Telefone</label><input id="cl-tel" placeholder="(00) 00000-0000"></div>
      <div class="form-group"><label>E-mail</label><input id="cl-email" type="email" placeholder="clinica@email.com"></div>
      <div class="form-group full"><label>Endereço</label><input id="cl-end" placeholder="Rua, número, bairro"></div>
      <div class="form-group"><label>Cidade</label><input id="cl-cidade" placeholder="Brasília"></div>
      <div class="form-group"><label>Estado</label><select id="cl-estado"><option>DF</option><option>SP</option><option>RJ</option><option>MG</option><option>GO</option><option>Outro</option></select></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('modal-cli')">Cancelar</button>
      <button class="btn btn-primary" onclick="criarClinica()">Salvar Clínica</button>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
async function loadClinicas(){
  const d=await api('/api/clinicas');
  const tbody=document.getElementById('tbody-cli');
  if(!d.clinicas?.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:24px">Nenhuma clínica cadastrada</td></tr>';return;}
  tbody.innerHTML=d.clinicas.map(c=>`
    <tr><td>${c.id}</td><td><strong>${c.nome}</strong></td><td>${c.cnpj||'—'}</td>
    <td>${c.responsavel||'—'}</td><td>${c.telefone||'—'}</td>
    <td>${c.cidade||'—'}</td><td>${c.estado||'—'}</td></tr>`).join('');
}
async function criarClinica(){
  const body={nome:document.getElementById('cl-nome').value,cnpj:document.getElementById('cl-cnpj').value,
    responsavel:document.getElementById('cl-resp').value,telefone:document.getElementById('cl-tel').value,
    email:document.getElementById('cl-email').value,endereco:document.getElementById('cl-end').value,
    cidade:document.getElementById('cl-cidade').value,estado:document.getElementById('cl-estado').value};
  if(!body.nome){toast('Informe o nome','error');return;}
  const d=await api('/api/clinicas','POST',body);
  if(d.ok){toast('Clínica cadastrada!','success');closeModal('modal-cli');loadClinicas();}
  else toast('Erro: '+d.error,'error');
}
loadClinicas();
</script>
{% endblock %}
